x-research-notes: >-
  As of 2026-05, Wawa's homepage, about page, and the github.com/wawa
  organization contain no developer portal, no public API documentation,
  no public repositories, no published OpenAPI/AsyncAPI specs, no SDKs,
  no status page, and no engineering blog. Wawa's digital integration is
  consumer-facing (mobile ordering, rewards, real-time gas prices, third-party
  delivery partnerships). Industry coverage describes an internal MuleSoft-based
  API management platform used to connect to third-party software, but this
  surface is not exposed to public developers. No artifacts (openapi/, asyncapi/,
  json-schema/, capabilities/, examples/, rules/, plans/, rate-limits/, finops/)
  were generated for this repository because there is no underlying public API
  surface to back them.
