name: Wawa
description: >-
  Wawa is a privately held, family-owned convenience store and fuel retail chain
  headquartered in Pennsylvania. Founded in 1803 as a dairy farm and operating
  convenience stores since 1964, Wawa runs approximately 1,100 stores across
  Pennsylvania, New Jersey, Delaware, Maryland, Virginia, Florida, North Carolina,
  Indiana, and Alabama. The company is a regional fresh-food, beverage, and fuel
  brand with a strong loyalty program (Wawa Rewards) and a mobile ordering app.
  Wawa operates an internal API management platform (built with MuleSoft) used to
  connect to third-party services such as Uber Eats, Grubhub, and DoorDash for
  delivery, but does not publish a public developer portal or expose public APIs.
